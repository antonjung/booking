# fly.toml — Village Hall Booking backend
# Replace "village-hall-booking-api" with your chosen app name (must be globally unique on Fly.io)

app = "village-hall-booking-api"
primary_region = "lhr"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DATABASE_PATH = "/data/booking.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "booking_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
